        quote: >
          Seoul National University (SNU) is a national research university located in Seoul, South Korea.
          Founded in 1946, Seoul National University is considered to be the most prestigious university in the country.
        description: >
          I'm currently pursuing my PhD degree in <mark>computer security</mark>. 
          By leveraging my expertise on compilers and computer systems, I'm currently aiming at building a system-wide fuzzing framework that encompasses the entire software stack, including user applications and OS kernels.

