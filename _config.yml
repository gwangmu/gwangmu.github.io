        quote: >
          Pohang University of Science and Technology (POSTECH) is a research university in Pohang, South Korea.
          Founded in 1986, POSTECH has been maintaining its reputation as one of the most prominent young universities in the world, being 1st in Times Higher Education "100 Under 50 Young Univ." rankings 2014.
        description: >
          I started my college years with the physics major, but I grew my interest in computer science while developing indie video games with Microsoft XNA.
          After finding myself more enthusiastic to computer engineering than physics, I decided to double-major computer engineering and take the path as a computer engineer. 

      - layout: left 
        title: POSTECH
        caption: Sep 2014 - Feb 2017
        sub_title: M.S. in Computer Science and Engineering 
        additional_links:
          - title: Department of Computer Science and Engineering 
            icon: fas fa-laptop-code
            url: https://cse.postech.ac.kr
        description: > 
          During my first few graduate years, I studied various <mark>compiler techniques</mark> using LLVM and published my first conference paper about computation offloading in MICRO.
          Later, I switched my interest to <mark>computer architecture</mark> and worked on designing energy-efficient neuromorphic circuits.

