about_content: | # this will include new lines to allow paragraphs
  Hi there! I'm a Ph.D. student at Seoul National University (SNU). 
  I'm currently interested in various computer security issues, especially in <mark>fuzz testing</mark>. 
  I have previously studied <mark>compiler techniques</mark> such as offloading 
  and <mark>computer architecture</mark> issues like neuromorphic computing. 
  Please visit [System Security Laboratory (compsec)](http://compsec.snu.ac.kr), 
  my research group led by my advisor [Byoungyoung Lee](http://lifeasageek.github.io), 
  for more ongoing security-related research topics.

